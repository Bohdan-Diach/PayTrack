<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceBuddy | Головна</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e5e5; }
        .bento-card { border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .sidebar { background-color: #f8f9fa; border-top-right-radius: 40px; border-bottom-right-radius: 40px; }
        .bg-orange-brand { background-color: #ff5722; }
        .bg-green-brand { background-color: #1a2e24; }
        .progress-ring__circle { transition: stroke-dashoffset 0.8s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 p-2 md:p-6 gap-6">

    <!-- Sidebar з РОБОЧИМИ посиланнями -->
    <aside class="sidebar w-64 p-8 hidden lg:flex flex-col justify-between shadow-xl">
        <div>
            <div class="mb-12">
                <h1 class="text-2xl font-bold text-slate-800 mb-8"><i class="fas fa-wallet text-emerald-600 mr-2"></i>UPFinance</h1>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold text-xl">US</div>
                    <div>
                        <div class="font-bold text-sm">Користувач</div>
                    </div>
                </div>
            </div>
            <nav class="space-y-2">
                <!-- Активна вкладка -->
                <a href="index.html" class="flex items-center gap-4 bg-green-brand text-white px-5 py-3 rounded-2xl font-medium"><i class="fas fa-home w-5"></i> Головна</a>
                <!-- Перехід на статистику -->
                <a href="statistics.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100"><i class="fas fa-chart-pie w-5"></i> Статистика</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 max-w-6xl mx-auto w-full flex flex-col gap-6">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 h-full">
            
            <!-- Доступні кошти -->
            <div class="bento-card md:col-span-6 bg-orange-brand p-8 text-white flex flex-col justify-between items-center relative">
                <div class="w-full flex justify-between mb-4"><p class="text-sm">Доступно цього місяця</p></div>
                <h2 class="text-5xl font-bold mb-8 w-full text-left" id="total-balance">₴0</h2>
                <div class="relative w-32 h-32 flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                        <circle class="text-white/20 stroke-current" stroke-width="8" cx="50" cy="50" r="40" fill="transparent"></circle>
                        <circle id="balance-ring" class="text-white progress-ring__circle stroke-current" stroke-width="8" stroke-linecap="round" cx="50" cy="50" r="40" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="251.2"></circle>
                    </svg>
                    <span id="balance-percent" class="absolute text-2xl font-bold">0%</span>
                </div>
            </div>

            <!-- Останні операції -->
            <div class="bento-card md:col-span-6 bg-white p-6 flex flex-col">
                <h3 class="font-bold text-lg mb-6">Останні операції</h3>
                <div id="transactions-list" class="flex-1 space-y-2"></div>
            </div>

            <!-- Форма -->
            <div class="bento-card md:col-span-12 bg-white p-8">
                <h3 class="font-bold text-lg mb-6">Додати нову транзакцію</h3>
                <form id="transaction-form" class="flex gap-4">
                    <!-- Поле назви тепер НЕ має атрибута required -->
                    <input type="text" id="t-name" placeholder="Назва (необов'язково)" class="flex-1 bg-slate-50 py-4 px-4 rounded-2xl">
                    <input type="number" id="t-amount" placeholder="Сума" required class="w-40 bg-slate-50 py-4 px-4 rounded-2xl">
                    <select id="t-category" class="w-48 bg-slate-50 py-4 px-4 rounded-2xl">
                        <option value="income">💰 Дохід</option>
                        <option value="products" selected>🛒 Продукти</option>
                        <option value="transport">🚗 Транспорт</option>
                    </select>
                    <button type="submit" class="bg-slate-800 text-white px-8 rounded-2xl">Додати</button>
                </form>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
