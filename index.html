<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayTrack. | Головна</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e5e5; }
        .bento-card { border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .sidebar { background-color: #f8f9fa; border-top-right-radius: 40px; border-bottom-right-radius: 40px; }
        .bg-orange-brand { background-color: #ff5722; }
        .bg-green-brand { background-color: #1a2e24; }
        .progress-ring__circle { transition: stroke-dashoffset 0.8s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* МАГІЯ ТЕМНОЇ ТЕМИ */
        html.dark body { background-color: #0f172a; color: #f8fafc; }
        html.dark .bento-card { background-color: #1e293b; color: #f8fafc; border: 1px solid #334155; box-shadow: none; }
        html.dark .bento-card h2, html.dark .bento-card h3, html.dark .bento-card h4 { color: #f8fafc; }
        html.dark .sidebar { background-color: #1e293b; border-right: 1px solid #334155; }
        html.dark input, html.dark select { background-color: #334155; color: #f8fafc; border-color: #475569; }
        html.dark .bg-slate-50 { background-color: #334155; }
        html.dark nav.fixed { background-color: #1e293b; border-top: 1px solid #334155; }
        html.dark .text-slate-800 { color: #f8fafc; }
        html.dark .text-slate-500 { color: #94a3b8; }
        html.dark .text-slate-400 { color: #64748b; }
        html.dark .bg-white { background-color: #1e293b; }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 p-4 md:p-6 gap-6 pb-24 md:pb-6">

    <aside class="sidebar w-64 p-8 hidden lg:flex flex-col justify-between shadow-xl">
        <div>
            <div class="mb-12">
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tighter"><i class="fas fa-credit-card text-emerald-500 mr-2"></i>PayTrack<span class="text-emerald-500">.</span></h1>
            </div>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-4 bg-green-brand text-white px-5 py-3 rounded-2xl font-medium shadow-lg"><i class="fas fa-home w-5 text-center"></i> Головна</a>
                <a href="statistics.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors dark:hover:bg-slate-800"><i class="fas fa-chart-pie w-5 text-center"></i> Статистика</a>
                <a href="history.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors dark:hover:bg-slate-800"><i class="fas fa-list w-5 text-center"></i> Історія</a>
                <a href="limits.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors dark:hover:bg-slate-800"><i class="fas fa-shield-alt w-5 text-center"></i> Ліміти</a>
                <a href="settings.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors dark:hover:bg-slate-800"><i class="fas fa-cog w-5 text-center"></i> Профіль</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 max-w-6xl mx-auto w-full flex flex-col gap-6">
        
        <header class="lg:hidden mt-2 mb-2 px-2 flex justify-between items-center">
            <div>
               <h1 class="text-4xl font-extrabold text-slate-900 tracking-tighter"><i class="fas fa-credit-card text-emerald-500 mr-2"></i>PayTrack<span class="text-emerald-500">.</span></h1>
                <p class="text-slate-500 text-sm font-medium mt-1">Твій щоденник фінансів</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <div class="bento-card md:col-span-4 bg-orange-brand p-6 text-white flex flex-col justify-between items-center relative h-full">
                <div class="w-full flex justify-between mb-2"><p class="text-sm font-medium">Доступно</p></div>
                <h2 class="text-4xl font-bold mb-4 w-full text-left truncate" id="total-balance">₴0</h2>
                <div class="relative w-28 h-28 flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                        <circle class="text-white/20 stroke-current" stroke-width="8" cx="50" cy="50" r="40" fill="transparent"></circle>
                        <circle id="balance-ring" class="text-white progress-ring__circle stroke-current" stroke-width="8" stroke-linecap="round" cx="50" cy="50" r="40" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="251.2"></circle>
                    </svg>
                    <span id="balance-percent" class="absolute text-xl font-bold">0%</span>
                </div>
            </div>

            <div class="bento-card md:col-span-4 bg-white p-6 flex flex-col justify-between relative group h-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg text-slate-800">На мрію</h3>
                    <button onclick="openGoalModal()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-400 hover:text-emerald-500 flex items-center justify-center transition-all"><i class="fas fa-pen text-sm"></i></button>
                </div>
                <div id="goal-ui-content" class="flex-1 flex flex-col justify-center"></div>
            </div>

            <div class="bento-card md:col-span-4 bg-white p-6 flex flex-col h-full">
                <h3 class="font-bold text-lg mb-4 text-slate-800">Останні операції</h3>
                <div id="transactions-list" class="flex-1 space-y-2 overflow-hidden flex flex-col justify-between"></div>
            </div>

            <div class="bento-card md:col-span-12 bg-white p-8 mt-2">
                <h3 class="font-bold text-lg mb-6 text-slate-800">Додати нову транзакцію</h3>
                <form id="transaction-form" class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="t-name" placeholder="Назва (необов'язково)" class="flex-1 bg-slate-50 py-4 px-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
                    <input type="number" id="t-amount" placeholder="Сума (₴)" required class="w-full md:w-40 bg-slate-50 py-4 px-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
                                        <select id="t-category" class="w-full md:w-48 bg-slate-50 py-4 px-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium cursor-pointer">
                        <optgroup label="Доходи">
                            <option value="salary">💵 Зарплата</option>
                            <option value="freelance">💻 Фріланс</option>
                            <option value="gifts">🎁 Подарунки</option>
                            <option value="cashback">🪙 Кешбек</option>
                        </optgroup>
                        <optgroup label="Витрати">
                            <option value="products" selected>🛒 Продукти</option>
                            <option value="transport">🚗 Транспорт</option>
                            <option value="utilities">💡 Ком. послуги</option>
                            <option value="clothing">👕 Одяг</option>
                            <option value="entertainment">🎬 Розваги</option>
                            <option value="shopping">🛍️ Покупки</option>
                            <option value="other">📦 Інше</option>
                        </optgroup>
                    </select>

                    <button type="submit" class="bg-slate-900 hover:bg-slate-800 text-white font-bold px-8 py-4 rounded-2xl transition-all shadow-lg active:scale-95 whitespace-nowrap">Додати</button>
                </form>
            </div>

        </div>
    </main>

    <div id="goal-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div id="goal-modal-card" class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative mx-4">
            <button onclick="closeGoalModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 transition-colors"><i class="fas fa-times text-xl"></i></button>
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 rotate-3"><i class="fas fa-car-side"></i></div>
                <h3 class="text-2xl font-bold text-slate-800">Твоя нова ціль</h3>
                <p class="text-slate-500 text-sm mt-1">Встанови мету, і ми допоможемо її досягти!</p>
            </div>
            <form id="goal-modal-form" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-2">На що збираємо?</label>
                    <input type="text" id="modal-g-name" placeholder="напр. Автомобіль" class="w-full bg-slate-50 py-4 px-5 rounded-2xl mt-1 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-2">Яка сума потрібна?</label>
                    <input type="number" id="modal-g-amount" placeholder="Сума (₴)" class="w-full bg-slate-50 py-4 px-5 rounded-2xl mt-1 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" required>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-emerald-500/30 mt-2">Зберегти ціль</button>
            </form>
            <div id="modal-success" class="hidden text-center py-6">
                <div class="w-20 h-20 bg-emerald-500 text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-4 animate-bounce"><i class="fas fa-check"></i></div>
                <h4 class="text-xl font-bold text-slate-800 mb-2">Збережено!</h4>
                <p id="modal-motivation-text" class="text-emerald-600 font-medium text-lg leading-snug"></p>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 flex justify-around items-center py-2 pb-safe lg:hidden z-50 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center p-2 text-emerald-600"><i class="fas fa-home text-xl mb-1"></i><span class="text-[10px] font-medium">Головна</span></a>
        <a href="statistics.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors"><i class="fas fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-medium">Стат</span></a>
        <a href="history.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors"><i class="fas fa-list text-xl mb-1"></i><span class="text-[10px] font-medium">Історія</span></a>
        <a href="limits.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors"><i class="fas fa-shield-alt text-xl mb-1"></i><span class="text-[10px] font-medium">Ліміти</span></a>
        <a href="settings.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors"><i class="fas fa-cog text-xl mb-1"></i><span class="text-[10px] font-medium">Профіль</span></a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
