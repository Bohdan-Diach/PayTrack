<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPFinance | Налаштування</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e5e5; }
        .bento-card { border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .sidebar { background-color: #f8f9fa; border-top-right-radius: 40px; border-bottom-right-radius: 40px; }
        .bg-green-brand { background-color: #1a2e24; }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 p-2 md:p-6 gap-6 pb-24 md:pb-6">
    <aside class="sidebar w-64 p-8 hidden lg:flex flex-col justify-between shadow-xl">
        <div>
            <div class="mb-12">
                <h1 class="text-2xl font-bold text-slate-800 mb-8"><i class="fas fa-wallet text-emerald-600 mr-2"></i>UPFinance</h1>
            </div>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-home w-5 text-center"></i> Головна</a>
                <a href="statistics.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-chart-pie w-5 text-center"></i> Статистика</a>
                <a href="history.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-list w-5 text-center"></i> Історія</a>
                <a href="limits.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-shield-alt w-5 text-center"></i> Ліміти</a>
                <a href="settings.html" class="flex items-center gap-4 bg-green-brand text-white px-5 py-3 rounded-2xl font-medium shadow-lg"><i class="fas fa-cog w-5 text-center"></i> Налаштування</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 max-w-6xl mx-auto w-full flex flex-col gap-6">
        <h2 class="text-3xl font-bold text-slate-800 mb-2 px-2">Налаштування профілю</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bento-card bg-white p-8">
    <h3 class="font-bold text-lg mb-6 text-slate-800"><i class="fas fa-user-circle text-emerald-500 mr-2"></i> Профіль</h3>
    <form id="profile-form" class="space-y-4">
        <div>
            <label class="text-sm font-medium text-slate-500">Ім'я користувача</label>
            <input type="text" id="user-name-input" placeholder="Введіть ім'я" class="w-full bg-slate-50 py-3 px-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" required>
        </div>
        <div>
            <label class="text-sm font-medium text-slate-500">Email</label>
            <input type="email" id="user-email-input" placeholder="Введіть email" class="w-full bg-slate-50 py-3 px-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" required>
        </div>
        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl mt-4 transition-all shadow-lg shadow-emerald-500/30">Зберегти зміни</button>
    </form>
</div>
            </div>

            <div class="bento-card bg-rose-50 border border-rose-100 p-8">
                <h3 class="font-bold text-lg mb-2 text-rose-600"><i class="fas fa-exclamation-triangle mr-2"></i> Небезпечна зона</h3>
                <p class="text-sm text-rose-500/80 mb-6">Видалення даних є незворотнім. Усі ваші транзакції, цілі та ліміти будуть стерті з пам'яті браузера.</p>
                
                <button id="clear-data-btn" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-rose-500/30">
                    Очистити всі дані
                </button>
            </div>

        </div>
    </main>

<nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 flex justify-around items-center py-2 pb-safe lg:hidden z-50 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center p-2 text-emerald-600">
            <i class="fas fa-home text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Головна</span>
        </a>
        <a href="statistics.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors">
            <i class="fas fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Стат</span>
        </a>
        <a href="history.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors">
            <i class="fas fa-list text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Історія</span>
        </a>
        <a href="limits.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors">
            <i class="fas fa-shield-alt text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Ліміти</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-500 transition-colors">
            <i class="fas fa-cog text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Профіль</span>
        </a>
    </nav>
    
    <script src="app.js"></script>
</body>
</html>
